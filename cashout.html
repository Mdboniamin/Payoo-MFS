<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#f4f5f7] min-h-screen">
    <div class="max-w-lg mx-auto bg-white rounded-b-xl">
        <!-- nav bar -->
        <div class="border-b-2 border-gray-300 min-h-[50px] flex justify-between items-center p-3">
            <div class="flex">
                <img src="assets/Group.png" alt="" class="h-[50px]">
                <div class="ml-3">
                    <h2 class="font-bold" >$<span id="available-balance">45000</span></h2>
                    <p class="text-[#08080880]">Available Balance</p>
                </div>
            </div>
            <div>
                <button class="btn text-[#08080880]"><i
                        class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>Log Out</button>
            </div>
        </div>
        <!-- welcome text -->
        <div class="mt-8 p-4">
            <h1 class="text-2xl font-bold mb-4">🔥 Welcome to Payooo!</h1>
            <p class="text-[#08080880]">Enjoy easy and convenient financial services with us.<br> Cashout charge is low
                and</p>
        </div>

        <!-- 6 section features -->
        <div class="grid grid-cols-3 gap-4 text-[#08080880] p-4">
            <div class="border border-gray-300 text-center p-3 rounded-xl">
                <img src="assets/wallet1.png" alt="" class="mx-auto mb-2">
                <p>Add Money</p>
            </div>
            <div class="border border-gray-300 text-center p-3 rounded-xl">
                <img src="assets/send1.png" alt="" class="mx-auto mb-2">
                <p>Cashout</p>
            </div>
            <div class="border border-gray-300 text-center p-3 rounded-xl">
                <img src="assets/money1.png" alt="" class="mx-auto mb-2">
                <p>Transfer Money</p>
            </div>
            <div class="border border-gray-300 text-center p-3 rounded-xl">
                <img src="assets/bonus1.png" alt="" class="mx-auto mb-2">
                <p>Get Bonus</p>
            </div>
            <div class="border border-gray-300 text-center p-3 rounded-xl">
                <img src="assets/purse1.png" alt="" class="mx-auto mb-2">
                <p>Pay Bill</p>
            </div>
            <div class="border border-gray-300 text-center p-3 rounded-xl">
                <img src="assets/transaction1.png" alt="" class="mx-auto mb-2">
                <p>Transaction</p>
            </div>
        </div>
    </div>
     <div class="all-form-sections max-w-lg mx-auto">
            <!-- cash out form -->
            <div>
                <h1 class="font-bold my-5">Cash Out</h1>
                <form action="" class=" bg-white rounded-2xl p-8">
                    <div>
                        <h1 class="font-semibold">Agent Number</h1>
                        <input type="text" placeholder="Enter 11 digit number" class="input bg-[#f4f5f7] mt-3 rounded-3xl w-full" id="account-number"/>
                    </div>
                    <div>
                        <h1 class="mt-3 font-semibold">Amount</h1>
                        <input type="text" placeholder="Add Amount to withdraw" class="input bg-[#f4f5f7] mt-3 rounded-3xl w-full" id="cashout-amount"/>
                    </div>
                    <div>
                        <h1 class="mt-3 font-semibold">Pin Number</h1>
                        <input type="text" placeholder="Enter 4 Digit Pin number" class="input bg-[#f4f5f7] mt-3 rounded-3xl w-full" id="cashout-pin"/>
                    </div>
                    <button class="btn bg-[#0874f2] mt-5 w-full rounded-3xl text-white font-semibold" id="withdraw-money-btn">Withdraw Money</button>
                </form>
            </div>
        </div>

        <script src="./js/cashout.js"></script>
</body>

</html>
